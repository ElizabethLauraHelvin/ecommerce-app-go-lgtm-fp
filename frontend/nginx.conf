server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # SPA routing — Vue Router history mode
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Product API ke Product Service
    location /api/products {
        proxy_pass         http://product-service.ecommerce.svc.cluster.local:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Order API ke Order Service
    location /api/orders {
        proxy_pass         http://order-service.ecommerce.svc.cluster.local:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy User API ke User Service
    location /api/users {
        proxy_pass         http://user-service.ecommerce.svc.cluster.local:8083;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Faro beacon ke Alloy faro.receiver
    # Browser kirim ke /faro/collect (same-origin, no CORS)
    # Nginx forward ke Alloy di dalam cluster
    location /faro/collect {
        proxy_pass         http://alloy.monitoring.svc.cluster.local:12347/collect;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_read_timeout    10s;
        proxy_next_upstream   error timeout;
        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
